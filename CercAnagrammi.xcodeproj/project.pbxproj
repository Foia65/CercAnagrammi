			shellScript = "# Type a script or drag a script file from your workspace to insert its path.\n#!/bin/bash\n\n# This script automatically increments the build number (CFBundleVersion)\n# by using agvtool, which updates the 'CURRENT_PROJECT_VERSION' build setting.\n# This approach works correctly when 'Generate Info.plist File' is set to YES.\n\n# --- IMPORTANT Xcode Configuration ---\n# Ensure your project's build settings have:\n# 1. Versioning System: 'Apple-Generic' (under Build Settings -> Versioning)\n# 2. Current Project Version: (e.g., '1' or your desired starting build number)\n\nif [ \"$XCODE_RUNNING_FOR_PREVIEWS\" = \"1\" ]; then\n  echo \"Skipping for SwiftUI previews\"\n  exit 0\nfi\n\nif [ \"$EFFECTIVE_PLATFORM_NAME\" = \"-iphonesimulator\" ]; then\n  echo \"Skipping simulator build\"\n  exit 0\nfi\n\n\necho \"--- Incrementing Build Number using agvtool ---\"\n\n# Get current build number (CURRENT_PROJECT_VERSION) using agvtool\n# The '-terse' flag returns just the number.\ncurrent_build_number=$(agvtool what-version -terse 2>/dev/null)\n\n# Check if agvtool successfully retrieved the version\nif [ -z \"$current_build_number\" ]; then\n    echo \"Error: agvtool could not determine the current project version.\"\n    echo \"Please ensure 'Versioning System' is set to 'Apple-Generic' and 'Current Project Version' is a valid number in your target's Build Settings.\"\n    exit 1\nfi\n\necho \"Current build number (CURRENT_PROJECT_VERSION): ${current_build_number}\"\n\n# Increment the build number to the next version using agvtool\n# The '-all' flag updates all targets that use this versioning.\nagvtool next-version -all\n\n# Verify the new build number after incrementing\nnew_build_number=$(agvtool what-version -terse 2>/dev/null)\n\necho \"New build number (CURRENT_PROJECT_VERSION): ${new_build_number}\"\n\nif [ \"$new_build_number\" == \"$current_build_number\" ]; then\n    echo \"Warning: Build number did not increment. Check agvtool output for errors or if versioning is set up correctly.\"\nfi\n\necho \"--- Build Number Increment Complete ---\"\n\n\n\n\n\n";
