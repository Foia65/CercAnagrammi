included:
  - CercAnagrammi  # Replace with your main source folder if needed

excluded:
  - Carthage
  - Pods
  - fastlane
  - build
  - DerivedData
  - .swiftlint.yml

identifier_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 45
    error: 60
  excluded:
    - id
    - x
    - y
    - i

opt_in_rules:
  - array_init
  - closure_spacing
  - unused_optional_binding
  - unused_closure_parameter
  - contains_over_first_not_nil
  - empty_collection_literal
  - extension_access_modifier
  - first_where
  - multiline_arguments_brackets
  - multiline_function_chains
  - nimble_operator
  - optional_enum_case_matching
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - single_test_class
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

file_length:
  warning: 500
  ignore_comment_only_lines: true

disabled_rules:
  - type_body_length
  - trailing_whitespace
  - todo
  - redundant_discardable_let
  - function_parameter_count
  - line_length # comment this out if you want it enforced
  - multiple_closures_with_trailing_closure
  - function_body_length

analyzer_rules:
  - unused_declaration
  - explicit_self

